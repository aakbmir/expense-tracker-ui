<main class="pw-page">
  <div class="pw-container overview">

    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 12px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">

        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Overview
        </h2>
      </div>
    </div>

    <!-- ================= HERO BALANCE & MONTH ================= -->
    <div class="pw-glass pw-card hero"
      style="display: flex; flex-direction: row; justify-content: space-between; align-items: center; padding: 20px; text-align: left;">

      <!-- Balance Info (Left) -->
      <div style="display: flex; flex-direction: column; flex: 1;">
        <div class="hero-title" style="margin-bottom: 4px; text-align: left;">Spent this month Balance</div>

        <div class="hero-amount" [ngClass]="totalSavings > 0 ? 'positive' : 'negative'"
          style="margin-bottom: 12px; text-align: left;">
          {{ totalExpense | number:'1.2-2' }} <span style="font-size: 14px; font-weight: 500; opacity: 0.8;">AED</span>
        </div>

        <div class="progress-wrapper" style="width: 100%; max-width: 200px; margin-bottom: 6px;">
          <div class="progress-bar" style="background: #10b981; box-shadow: inset 0 2px 4px rgba(0,0,0,0.2);">
            <div class="progress-fill" [style.width.%]="(totalExpense / totalBudget) * 100"
              style="background: #f43f5e; box-shadow: 2px 0 8px rgba(0,0,0,0.4);">
            </div>
          </div>
        </div>

        <div
          style="display: flex; justify-content: space-between; align-items: center; width: 100%; max-width: 200px; margin-top: 2px;">
          <div style="display: flex; flex-direction: column;">
            <span
              style="font-size: 10px; font-weight: 700; color: var(--pw-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Saved</span>
            <span style="font-size: 13px; font-weight: 800;"
              [style.color]="totalSavings >= 0 ? '#10b981' : '#f43f5e'">{{ totalSavings | number:'1.0-0' }} <span
                style="font-size: 10px; font-weight: 500; opacity: 0.8;">AED</span></span>
          </div>
          <div style="text-align: right; display: flex; flex-direction: column;">
            <span
              style="font-size: 10px; font-weight: 700; color: var(--pw-muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 2px;">Budget</span>
            <span style="font-size: 13px; font-weight: 800; color: #10b981;">{{ totalBudget | number:'1.0-0' }} <span
                style="font-size: 10px; font-weight: 500; opacity: 0.8;">AED</span></span>
          </div>
        </div>
      </div>

      <!-- Month Nav (Right) -->
      <div
        style="display: flex; flex-direction: column; justify-content: center; align-items: center; margin-left: 12px;">
        <div style="display: flex; flex-direction: column; gap: 6px; align-items: center; padding: 6px;">
          <button class="pw-btn-icon-small" (click)="applyFilters('right')"
            style="font-size: 12px; padding: 4px; width: 28px; height: 28px; min-width: unset;"><i
              class="fa fa-chevron-up"></i></button>
          <div
            style="margin: 0; font-weight: 700; font-size: 14px; color: var(--pw-text); letter-spacing: 0.5px; width: 60px; text-align: center; line-height: 1.2;">
            {{monthText}}<br><span style="font-weight: 500; font-size: 11px; opacity: 0.8;">{{year}}</span></div>
          <button class="pw-btn-icon-small" (click)="applyFilters('left')"
            style="font-size: 12px; padding: 4px; width: 28px; height: 28px; min-width: unset;"><i
              class="fa fa-chevron-down"></i></button>
        </div>
      </div>

    </div>

    <!-- ================= QUICK ACTIONS ================= -->
    <div class="pw-seg quick-actions">
      <button class="pw-btn mobile-only" (click)="showReport('overview')">Overview</button>
      <button class="pw-btn mobile-only" (click)="showReport('trend')">Trend</button>
      <button class="pw-btn mobile-only" (click)="showReport('group')">Group</button>
      <button class="pw-btn pw-btn-ghost" (click)="searchFlag = !searchFlag">
        <i class="fa fa-sliders"></i>
        Filter
      </button>
    </div>

    <!-- ================= FILTER SECTION ================= -->
    <div *ngIf="searchFlag" class="pw-glass pw-card filters">

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Category')">
        <option value="">Category</option>
        <option *ngFor="let item of categoryList">
          {{ item }}
        </option>
      </select>

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Sub')">
        <option value="">Sub Category</option>
        <option *ngFor="let item of subCategoryList">
          {{ item }}
        </option>
      </select>

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Main')">
        <option value="">Main Category</option>
        <option *ngFor="let item of mainCategoryList">
          {{ item }}
        </option>
      </select>

    </div>

    <!-- ================= TRANSACTIONS ================= -->
    <div *ngIf="categoryTransactionList.length > 0" class="cat-main-card pw-glass">
      <div class="items-container" style="max-height: min(44vh, 420px); overflow-y: auto;">
        <div *ngFor="let item of categoryTransactionList; let isLast = last" class="item-row"
          [class.item-row-last]="isLast" style="padding-top: 14px; padding-bottom: 14px;">

          <div class="row-left" style="flex-direction: column; align-items: flex-start; gap: 4px;">
            <div class="item-title" style="font-weight: 500; font-size: 15px;">{{ item.category }}</div>
            <div
              style="font-size: 12px; color: var(--pw-muted); max-width: 140px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
              {{ item.note }}</div>
          </div>

          <div class="row-right" style="flex-direction: row; align-items: center; gap: 16px;">
            <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
              <div
                style="font-weight: 500; font-size: 14px; color: #38bdf8; text-shadow: 0 0 4px rgba(56, 189, 248, 0.4);">
                {{item.price | number:'1.2-2'}} <span
                  style="font-size: 11px; opacity: 0.8; font-weight: 400; color: var(--pw-text); text-shadow: none;">AED</span>
              </div>
              <div style="font-size: 12px; color: var(--pw-muted);">{{item.date | date : 'MMM dd, EEEE'}}</div>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</main>
