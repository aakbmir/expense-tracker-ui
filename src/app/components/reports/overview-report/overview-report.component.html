<main class="pw-page">
  <div class="pw-container overview">

    <!-- ================= HEADER ================= -->
    <div class="pw-glass pw-header">

      <div>
        <div class="pw-title">Overview</div>

      </div>

      <div class="month-nav" style="display: flex; align-items: center; gap: 12px;">
        <button class="pw-btn pw-btn-icon" (click)="applyFilters('left')" aria-label="Previous month">
          <i class="fa fa-chevron-left" style="font-size: 14px;"></i>
        </button>
        <div class="pw-subtitle">{{ monthText }} {{ year }}</div>
        <button class="pw-btn pw-btn-icon" (click)="applyFilters('right')" aria-label="Next month">
          <i class="fa fa-chevron-right" style="font-size: 14px;"></i>
        </button>
      </div>

    </div>

    <!-- ================= HERO BALANCE ================= -->
    <div class="pw-glass pw-card hero">

      <div class="hero-title">Available Balance</div>

      <div class="hero-amount" [ngClass]="totalSavings > 0 ? 'positive' : 'negative'">
        {{ totalSavings | number:'1.2-2' }} AED
      </div>

      <div class="progress-wrapper">
        <div class="progress-bar">
          <div class="progress-fill" [style.width.%]="(totalExpense / totalBudget) * 100">
          </div>
        </div>
      </div>

      <small>
        {{ totalExpense | number:'1.0-0' }} /
        {{ totalBudget | number:'1.0-0' }} Spent
      </small>

    </div>

    <!-- ================= QUICK ACTIONS ================= -->
    <div class="pw-seg quick-actions">
      <button class="pw-btn" (click)="showReport('overview')">Overview</button>
      <button class="pw-btn" (click)="showReport('trend')">Trend</button>
      <button class="pw-btn" (click)="showReport('group')">Group</button>
      <button class="pw-btn pw-btn-ghost" (click)="searchFlag = !searchFlag">
        <i class="fa fa-sliders"></i>
        Filter
      </button>
    </div>

    <!-- ================= FILTER SECTION ================= -->
    <div *ngIf="searchFlag" class="pw-glass pw-card filters">

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Category')">
        <option value="">Category</option>
        <option *ngFor="let item of categoryList">
          {{ item }}
        </option>
      </select>

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Super')">
        <option value="">Super Category</option>
        <option *ngFor="let item of superCategoryList">
          {{ item }}
        </option>
      </select>

      <select class="pw-select" [(ngModel)]="selectedCategory" (change)="fetchTransactions('Parent')">
        <option value="">Parent Category</option>
        <option *ngFor="let item of parentCategoryList">
          {{ item }}
        </option>
      </select>

    </div>

    <!-- ================= TRANSACTIONS ================= -->
    <div class="transaction-list">
      <div *ngFor="let item of categoryTransactionList" class="pw-glass pw-card transaction">
        <div>
          <div class="category">{{ item.category }}</div>
          <div class="note">{{ item.note }}</div>
        </div>

        <div class="right">
          <div class="date">
            {{item.date | date : 'MMM dd, EEEE'}}
          </div>

          <div class="price expense">
            {{ item.price | number:'1.2-2' }} AED
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
