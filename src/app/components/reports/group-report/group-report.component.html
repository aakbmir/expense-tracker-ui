<main class="pw-page">
  <div class="pw-container pw-stack">

    <!-- Top Header -->
    <div
      style="padding: 0px 10px; padding-bottom: 10px; margin-bottom: 0px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; display: flex; justify-content: space-between; align-items: center; gap: 12px;">
        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Group </h2>
        <button class="pw-btn-icon-small mobile-only" (click)="themeService.toggleTheme()"
          style="font-size: 18px; color: var(--pw-text); margin: 0; padding: 0; width: auto; height: auto;">
          <i class="fa" [ngClass]="(themeService.isLightMode$ | async) ? 'fa-moon-o' : 'fa-sun-o'"></i>
        </button>
      </div>
    </div>

    <div style="display: flex;justify-content: space-between;" class="pw-segg quick-action">
      <button class="pw-btn mobile-only" (click)="showReport('overview')">Overview</button>
      <button class="pw-btn mobile-only" (click)="showReport('trend')">Trend</button>
      <button class="pw-btn mobile-only" (click)="showReport('group')">Group</button>
      <button class="pw-btn pw-btn-ghost" (click)="searchFlag = !searchFlag">
        <i class="fa fa-sliders"></i>
        Filter
      </button>
    </div>

    <!-- Month Sub-Header -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 10px 4px;">
      <div style="display: flex; justify-content: space-between; width: 45%;">
        <button class="pw-btn-icon-small" (click)="applyFilters('left')" style="font-size: 14px;">
          <i class="fa fa-chevron-left"></i>
        </button>
        <div
          style="margin: 0; font-weight: 500; font-size: 16px; color: var(--pw-text); letter-spacing: 0.5px; text-align: left;">
          {{monthText}} {{year}}</div>
        <button class="pw-btn-icon-small" (click)="applyFilters('right')" style="font-size: 14px;">
          <i class="fa fa-chevron-right"></i>
        </button>
      </div>
      <span style="text-align: center; color: #38bdf8; font-weight: 700; font-size: 18px;">
        {{totalExpense | number:'1.2-2'}}
        <span style="font-size: 12px; opacity: 0.8; font-weight: 400; color: var(--pw-text);">AED
          total</span>
      </span>
    </div>

    <!-- ================= CONTENT ================= -->
    <div class="cat-accordion">
      <section *ngFor="let mainCategoryObj of cumulativeReport" class="main-card">
        <button class="main-head" (click)="mainCategoryObj.expanded = !mainCategoryObj.expanded">
          <div class="main-head-content">
            <div class="main-title">{{ mainCategoryObj.name }}</div>
            <div class="main-stats">
              <div class="stat-item">
                <span class="stat-label">Expense</span>
                <span class="stat-value">{{ mainCategoryObj.expense | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Budget</span>
                <span class="stat-value">{{ mainCategoryObj.budget | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item stat-remaining">
                <span class="stat-label">Savings</span>
                <span class="stat-value"
                  [ngClass]="{'negative': (mainCategoryObj.budget - mainCategoryObj.expense) < 0}">{{
                  (mainCategoryObj.budget - mainCategoryObj.expense) | number:'1.2-2' }}
                  AED</span>
              </div>
            </div>
          </div>
          <i [ngClass]="mainCategoryObj.expanded ? 'fa fa-chevron-up' : 'fa fa-chevron-down'"></i>
        </button>

        <div *ngIf="mainCategoryObj.expanded" class="main-body">
          <div *ngFor="let subCategoryObj of mainCategoryObj?.subCategoryDtoList" class="sub-card">
            <button class="sub-head" (click)="subCategoryObj.expanded = !subCategoryObj.expanded">
              <div class="sub-head-content">
                <div class="sub-title">{{ subCategoryObj.name }}</div>
                <div class="sub-stats">
                  <span class="sub-stat">Expense: <strong>{{ subCategoryObj.expense | number:'1.2-2'
                      }}</strong></span>
                  <span class="sub-stat">Budget: <strong>{{ subCategoryObj.budget | number:'1.2-2' }}</strong></span>
                  <span class="sub-stat sub-stat--remaining"
                    [ngClass]="{'negative': (subCategoryObj.budget - subCategoryObj.expense) < 0}">Remaining:
                    <strong>{{ (subCategoryObj.budget -
                      subCategoryObj.expense) | number:'1.2-2' }}</strong></span>
                </div>
              </div>
              <i [ngClass]="subCategoryObj.expanded ? 'fa fa-chevron-up' : 'fa fa-chevron-down'"></i>
            </button>

            <div *ngIf="subCategoryObj.expanded" class="item-grid">
              <div *ngFor="let categoryObj of subCategoryObj.categoryDtoList">
                <button class="cat-item"
                  (click)="openDialog(categoryObj.name, 'fetch-category-report-details', 90, 100)">
                  <span class="item-name">{{categoryObj.name}}</span>
                  <span class="item-main-val" [ngClass]="{
                    'negative': categoryObj.expense > categoryObj.budget && categoryObj.expense != 0,
                    'zero-val': categoryObj.expense == 0
                  }">
                    {{categoryObj.expense | number:'1.2-2'}}
                  </span>
                  <span class="item-sub-val">Bgt: {{categoryObj.budget | number:'1.2-2'}}</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- <app-footer></app-footer> -->
  </div>
</main>
