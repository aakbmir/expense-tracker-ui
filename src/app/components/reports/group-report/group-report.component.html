<main class="pw-page">
  <div class="pw-container pw-stack">

    <!-- Top Header -->
    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 8px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">
        <i class="fa fa-chevron-down mobile-only" [matMenuTriggerFor]="routeMenu"
          style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);"></i>

        <mat-menu #routeMenu="matMenu">
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/reports']"><i class="fa fa-pie-chart"
              style="width: 24px;"></i> Overview</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/expense']"><i class="fa fa-list-alt"
              style="width: 24px;"></i> Expense</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/income']"><i class="fa fa-money"
              style="width: 24px;"></i> Income</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/budget']"><i class="fa fa-credit-card"
              style="width: 24px;"></i> Budget</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/category']"><i class="fa fa-tags"
              style="width: 24px;"></i> Category</button>
        </mat-menu>


        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Group
        </h2>
      </div>
    </div>

    <!-- Month Sub-Header -->
    <div style="display: flex; justify-content: center; align-items: center; margin-bottom: 12px; padding: 0 4px;">
      <button class="pw-btn-icon-small" (click)="applyFilters('left')" style="font-size: 14px;"><i
          class="fa fa-chevron-left"></i></button>
      <div
        style="margin: 0; font-weight: 500; font-size: 16px; color: var(--pw-text); letter-spacing: 0.5px; width: 110px; text-align: center;">
        {{monthText}} {{year}}</div>
      <button class="pw-btn-icon-small" (click)="applyFilters('right')" style="font-size: 14px;"><i
          class="fa fa-chevron-right"></i></button>
    </div>

    <div
      style="text-align: center; margin-bottom: 16px; color: #38bdf8; text-shadow: 0 0 8px rgba(56,189,248,0.5); font-weight: 700; font-size: 18px;">
      {{totalExpense | number:'1.2-2'}} <span
        style="font-size: 12px; opacity: 0.8; font-weight: 400; color: var(--pw-text); text-shadow: none;">AED
        total</span>
    </div>

    <!-- ================= CONTENT ================= -->
    <div class="cat-accordion">
      <section *ngFor="let parentCategoryObj of cumulativeReport" class="parent-card">
        <button class="parent-head" (click)="parentCategoryObj.expanded = !parentCategoryObj.expanded">
          <div class="parent-head-content">
            <div class="parent-title">{{ parentCategoryObj.name }}</div>
            <div class="parent-stats">
              <div class="stat-item">
                <span class="stat-label">Expense</span>
                <span class="stat-value">{{ parentCategoryObj.expense | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Budget</span>
                <span class="stat-value">{{ parentCategoryObj.budget | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item stat-remaining">
                <span class="stat-label">Savings</span>
                <span class="stat-value"
                  [ngClass]="{'negative': (parentCategoryObj.budget - parentCategoryObj.expense) < 0}">{{
                  (parentCategoryObj.budget - parentCategoryObj.expense) | number:'1.2-2' }}
                  AED</span>
              </div>
            </div>
          </div>
          <i [ngClass]="parentCategoryObj.expanded ? 'fa fa-chevron-up' : 'fa fa-chevron-down'"></i>
        </button>

        <div *ngIf="parentCategoryObj.expanded" class="parent-body">
          <div *ngFor="let superCategoryObj of parentCategoryObj?.superCategoryDtoList" class="sub-card">
            <button class="sub-head" (click)="superCategoryObj.expanded = !superCategoryObj.expanded">
              <div class="sub-head-content">
                <div class="sub-title">{{ superCategoryObj.name }}</div>
                <div class="sub-stats">
                  <span class="sub-stat">Expense: <strong>{{ superCategoryObj.expense | number:'1.2-2'
                      }}</strong></span>
                  <span class="sub-stat">Budget: <strong>{{ superCategoryObj.budget | number:'1.2-2' }}</strong></span>
                  <span class="sub-stat sub-stat--remaining"
                    [ngClass]="{'negative': (superCategoryObj.budget - superCategoryObj.expense) < 0}">Remaining:
                    <strong>{{ (superCategoryObj.budget -
                      superCategoryObj.expense) | number:'1.2-2' }}</strong></span>
                </div>
              </div>
              <i [ngClass]="superCategoryObj.expanded ? 'fa fa-chevron-up' : 'fa fa-chevron-down'"></i>
            </button>

            <div *ngIf="superCategoryObj.expanded" class="item-grid">
              <div *ngFor="let categoryObj of superCategoryObj.categoryDtoList">
                <button class="cat-item"
                  (click)="openDialog(categoryObj.name, 'fetch-category-report-details', 100, 100)">
                  <span class="item-name">{{categoryObj.name}}</span>
                  <span class="item-amount">{{categoryObj.expense | number:'1.2-2'}} AED</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <!-- <app-footer></app-footer> -->
  </div>
</main>
