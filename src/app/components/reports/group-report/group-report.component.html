<main class="pw-page">
  <div class="pw-container pw-stack">

    <!-- ================= HEADER ================= -->
    <div class="pw-glass pw-header group-header">
      <div class="header-top">
        <button class="pw-btn pw-btn-ghost" [matMenuTriggerFor]="reportMenu">
          PennyWise
          <i class="fa fa-caret-down"></i>
        </button>
        <mat-menu #reportMenu="matMenu" xPosition="after">
          <button mat-menu-item class="reportBtn" (click)="showReport('home')">Home</button>
          <button mat-menu-item class="reportBtn" (click)="showReport('overview')">Overview</button>
          <button mat-menu-item class="reportBtn" (click)="showReport('group')">Group</button>
          <button mat-menu-item class="reportBtn" (click)="showReport('trend')">Trend</button>
        </mat-menu>

        <div class="month-nav">
          <button class="pw-btn pw-btn-icon" (click)="applyFilters('left')" aria-label="Previous month">
            <i class="fa fa-chevron-left" style="font-size: 14px;"></i>
          </button>
          <div class="pw-subtitle">{{ monthText }} {{ year }}</div>
          <button class="pw-btn pw-btn-icon" (click)="applyFilters('right')" aria-label="Next month">
            <i class="fa fa-chevron-right" style="font-size: 14px;"></i>
          </button>
        </div>
      </div>

      <div class="header-center">
        <div class="pw-subtitle">Total Expense</div>
        <div class="pw-kpi-value">{{totalExpense | number:'1.2-2'}} AED</div>
      </div>
    </div>

    <!-- ================= CONTENT ================= -->
    <div class="cat-accordion">
      <section *ngFor="let parentCategoryObj of cumulativeReport" class="parent-card">
        <button class="parent-head" (click)="parentCategoryObj.expanded = !parentCategoryObj.expanded">
          <div class="parent-head-content">
            <div class="parent-title">{{ parentCategoryObj.name }}</div>
            <div class="parent-stats">
              <div class="stat-item">
                <span class="stat-label">Expense</span>
                <span class="stat-value">{{ parentCategoryObj.expense | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item">
                <span class="stat-label">Budget</span>
                <span class="stat-value">{{ parentCategoryObj.budget | number:'1.2-2' }} AED</span>
              </div>
              <div class="stat-item stat-remaining">
                <span class="stat-label">Savings</span>
                <span class="stat-value">{{ (parentCategoryObj.budget - parentCategoryObj.expense) | number:'1.2-2' }} AED</span>
              </div>
            </div>
          </div>
          <i class="fa" [ngClass]="parentCategoryObj.expanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
        </button>

        <div *ngIf="parentCategoryObj.expanded" class="parent-body">
          <div *ngFor="let superCategoryObj of parentCategoryObj?.superCategoryDtoList" class="sub-card">
            <button class="sub-head" (click)="superCategoryObj.expanded = !superCategoryObj.expanded">
              <div class="sub-head-content">
                <div class="sub-title">{{ superCategoryObj.name }}</div>
                <div class="sub-stats">
                  <span class="sub-stat">Expense: <strong>{{ superCategoryObj.expense | number:'1.2-2' }}</strong></span>
                  <span class="sub-stat">Budget: <strong>{{ superCategoryObj.budget | number:'1.2-2' }}</strong></span>
                  <span class="sub-stat sub-stat--remaining">Remaining: <strong>{{ (superCategoryObj.budget - superCategoryObj.expense) | number:'1.2-2' }}</strong></span>
                </div>
              </div>
              <i class="fa" [ngClass]="superCategoryObj.expanded ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>

            <div *ngIf="superCategoryObj.expanded" class="item-grid">
              <div *ngFor="let categoryObj of superCategoryObj.categoryDtoList">
                <button class="cat-item" (click)="openDialog(categoryObj.name, 'fetch-category-report-details', 100, 100)">
                  <span class="item-name">{{categoryObj.name}}</span>
                  <span class="item-amount">{{categoryObj.expense | number:'1.2-2'}} AED</span>
                </button>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>

    <app-footer></app-footer>
  </div>
</main>
