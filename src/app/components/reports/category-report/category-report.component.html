<main class="pw-page">
  <div class="pw-container pw-stack">
    <!-- Top Header -->
    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 8px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">
        <i class="fa fa-chevron-down" [matMenuTriggerFor]="routeMenu"
          style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);"></i>

        <mat-menu #routeMenu="matMenu">
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/reports']"><i class="fa fa-pie-chart"
              style="width: 24px;"></i> Overview</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/expense']"><i class="fa fa-list-alt"
              style="width: 24px;"></i> Expense</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/budget']"><i class="fa fa-credit-card"
              style="width: 24px;"></i> Budget</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/category']"><i class="fa fa-tags"
              style="width: 24px;"></i> Category</button>
        </mat-menu>


        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Category Report
        </h2>
      </div>
    </div>

    <!-- Quick Stats & Filter -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
      <div style="display: flex; flex-direction: column; gap: 4px;">
        <div style="color: var(--pw-muted); font-size: 12px; font-weight: 600;">Total Expenses</div>
        <div style="color: #38bdf8; font-size: 22px; font-weight: 800; text-shadow: 0 0 8px rgba(56, 189, 248, 0.4);">
          {{expensesTotal}} <span
            style="font-size: 12px; color: var(--pw-text); opacity: 0.8; text-shadow: none;">AED</span>
        </div>
      </div>

      <div>
        <select class="pw-select" style="width: 80px; padding: 6px 10px;">
          <option>ALL</option>
          <option>JAN</option>
          <option>FEB</option>
          <option>MAR</option>
        </select>
      </div>
    </div>

    <div class="table-container">
      <div *ngFor="let parent of groupedDataKeys()" class="cat-main-card pw-glass"
        style="margin-bottom: 24px; border-radius: 16px; overflow: hidden; border: 1px solid rgba(56, 189, 248, 0.2); background: linear-gradient(180deg, rgba(8, 20, 42, 0.80) 0%, rgba(15, 20, 30, 0.70) 100%); box-shadow: 0 4px 40px rgba(14, 165, 233, 0.15), inset 0 2px 20px rgba(56, 189, 248, 0.1);">

        <div
          style="padding: 16px; border-bottom: 1px solid rgba(56, 189, 248, 0.12); text-align: left; background: rgba(56, 189, 248, 0.05);">
          <div
            style="font-weight: 900; letter-spacing: -0.3px; color: #38bdf8; font-size: 17px; text-shadow: 0 0 6px rgba(56, 189, 248, 0.4);">
            {{ parent }}
          </div>
        </div>

        <div *ngFor="let subCategory of groupedData[parent] | keys">
          <div
            style="padding: 12px 16px; background: rgba(37, 99, 235, 0.1); border-bottom: 1px solid rgba(37, 99, 235, 0.15); border-top: 1px solid rgba(37, 99, 235, 0.15);">
            <div style="font-weight: 800; color: var(--pw-text); font-size: 14px;">{{subCategory.key}}</div>
          </div>

          <div style="display: grid; gap: 8px; padding: 12px;">
            <div *ngFor="let categoryObj of subCategory.value">
              <button class="item-row"
                (click)="openDialog(categoryObj.category, 'fetch-category-report-details', 100, 100)"
                style="width: 100%; border: none; background: rgba(16, 25, 43, 0.4); border-radius: 10px; display: flex; justify-content: space-between; padding: 12px 16px; border: 1px solid rgba(255, 255, 255, 0.05); text-align: left; cursor: pointer; transition: background 150ms ease;"
                onmouseover="this.style.background='rgba(56, 189, 248, 0.1)'"
                onmouseout="this.style.background='rgba(16, 25, 43, 0.4)'">

                <div class="row-left" style="display: flex; flex-direction: column; gap: 4px;">
                  <div class="item-title" style="font-size: 14px; font-weight: 600; color: var(--pw-text);">
                    {{categoryObj.category}}</div>
                  <div style="font-size: 12px; color: var(--pw-muted);">Budget: {{categoryObj.budget | number:'1.2-2'}}
                    AED</div>
                </div>

                <div class="row-right" style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                  <div
                    [ngStyle]="{'color': categoryObj.expense === 0 || categoryObj.expense > categoryObj.budget ? '#f43f5e' : '#10b981', 'font-weight': '800', 'font-size': '14px', 'text-shadow': categoryObj.expense > categoryObj.budget ? '0 0 6px rgba(244, 63, 94, 0.4)' : '0 0 6px rgba(16, 185, 129, 0.4)' }">
                    {{categoryObj.expense | number:'1.2-2'}} <span
                      style="font-size: 10px; opacity: 0.8; color: var(--pw-text); text-shadow: none; font-weight: 400;">AED</span>
                  </div>
                  <div
                    [ngStyle]="{'color': categoryObj.deviate >= 0 ? '#10b981' : '#f43f5e', 'font-size': '12px', 'font-weight': '600'}">
                    {{categoryObj.deviate >= 0 ? '+' : ''}}{{categoryObj.deviate | number:'1.2-2'}} dev
                  </div>
                </div>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</main>
