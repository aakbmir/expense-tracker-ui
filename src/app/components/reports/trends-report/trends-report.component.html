<div class="pw-page">
  <div class="pw-container pw-stack">
    <div class="pw-glass pw-header">
      <div class="pw-row">
        <button class="pw-btn pw-btn-ghost" [matMenuTriggerFor]="afterMenu">
          PennyWise
          <i class="fa fa-caret-down"></i>
        </button>
        <mat-menu #afterMenu="matMenu" xPosition="after">
          <button mat-menu-item class="col-3 reportBtn" (click)="showReport('home')">Home</button>
          <button mat-menu-item class="col-3 reportBtn" (click)="showReport('overview')">Overview</button>
          <button mat-menu-item class="col-3 reportBtn" (click)="showReport('group')">Group</button>
          <button mat-menu-item class="col-3 reportBtn" (click)="showReport('trend')">Trend</button>
        </mat-menu>

        <div>
          <div class="pw-title">Trends</div>
          <div class="pw-subtitle">Month-by-month summary</div>
        </div>
      </div>
    </div>

    <div class="table-container">
      <div *ngFor="let item of responseList" class="pw-glass pw-card trend-card">
        <div class="trend-head">
          <div class="trend-month">{{item.month}}</div>
          <div class="trend-dev" [ngClass]="item.totalBudget > item.totalExpense ? 'good' : 'bad'">
            {{item.deviate | number:'1.2-2'}}
          </div>
        </div>

        <div class="trend-body">
          <div class="circle" [ngClass]="item.savings > 0 ? 'good' : 'bad'">
            {{item.savings | number:'1.2-2'}}
          </div>

          <div class="trend-grid">
            <div class="lbl">Remaining</div>
            <div class="lbl">Budget</div>
            <div class="lbl">Expense</div>
          </div>

          <div class="trend-grid right">
            <div class="val" [ngClass]="item.totalBudget > item.totalExpense ? 'good' : 'bad'">
              {{item.deviate | number:'1.2-2'}}
            </div>
            <div class="val">{{item.totalBudget | number:'1.2-2'}}</div>
            <div class="val">{{item.totalExpense | number:'1.2-2'}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
