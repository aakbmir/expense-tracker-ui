<div class="pw-page">
  <div class="pw-container pw-stack">
    <!-- Top Header -->
    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 2px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">
        <i class="fa fa-chevron-down mobile-only" [matMenuTriggerFor]="routeMenu"
          style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);"></i>

        <mat-menu #routeMenu="matMenu">
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/reports']"><i class="fa fa-pie-chart"
              style="width: 24px;"></i> Overview</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/expense']"><i class="fa fa-list-alt"
              style="width: 24px;"></i> Expense</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/income']"><i class="fa fa-money"
              style="width: 24px;"></i> Income</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/budget']"><i class="fa fa-credit-card"
              style="width: 24px;"></i> Budget</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/category']"><i class="fa fa-tags"
              style="width: 24px;"></i> Category</button>
        </mat-menu>


        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Trends
        </h2>
      </div>
    </div>

    <div style="text-align: center; margin-bottom: 24px;">
      <div style="font-size: 32px; font-weight: 900; letter-spacing: -1px; color: var(--pw-text);" [style.color]="totalSavings >= 0 ? '#10b981' : '#f43f5e'">
        {{ totalSavings | number:'1.2-2' }} <span style="font-size: 14px; opacity: 0.8; font-weight: 700;">AED</span>
      </div>
      <div style="color: var(--pw-muted); font-size: 11px; letter-spacing: 0.5px; text-transform: uppercase; font-weight: 700; margin-top: 4px;">
        Total Savings Over Trends
      </div>
    </div>

    <div class="table-container">
      <div *ngFor="let item of responseList" class="pw-glass pw-card trend-card">
        <div class="trend-head">
          <div class="trend-month">{{item.month}}</div>
          <div class="trend-dev" [ngClass]="item.totalBudget > item.totalExpense ? 'good' : 'bad'">
            {{item.deviate | number:'1.2-2'}}
          </div>
        </div>

        <div class="trend-body">
          <div class="circle" [ngClass]="item.savings > 0 ? 'good' : 'bad'">
            {{item.savings | number:'1.2-2'}}
          </div>

          <div class="trend-grid">
            <div class="lbl">Remaining</div>
            <div class="lbl">Budget</div>
            <div class="lbl">Expense</div>
          </div>

          <div class="trend-grid right">
            <div class="val" [ngClass]="item.totalBudget > item.totalExpense ? 'good' : 'bad'">
              {{item.deviate | number:'1.2-2'}}
            </div>
            <div class="val">{{item.totalBudget | number:'1.2-2'}}</div>
            <div class="val">{{item.totalExpense | number:'1.2-2'}}</div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
