<div class="pw-page">
  <div class="pw-container pw-stack">

    <!-- Top Header -->
    <div
      style="padding: 0px 10px; padding-bottom: 10px; margin-bottom: 0px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; display: flex; justify-content: space-between; align-items: center; gap: 12px;">
        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Budget </h2>
        <button class="pw-btn-icon-small mobile-only" (click)="themeService.toggleTheme()"
          style="font-size: 18px; color: var(--pw-text); margin: 0; padding: 0; width: auto; height: auto;">
          <i class="fa" [ngClass]="(themeService.isLightMode$ | async) ? 'fa-moon-o' : 'fa-sun-o'"></i>
        </button>
      </div>
    </div>

    <!-- Month & Total Sub-Header -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; padding: 0 4px;">
      <!-- Month selection -->
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="pw-btn-icon-small" (click)="applyFilters('left')" style="font-size: 14px;"><i
            class="fa fa-chevron-left"></i></button>
        <div
          style="margin: 0; font-weight: 500; font-size: 16px; color: var(--pw-text); letter-spacing: 0.5px; width: 110px; text-align: center;">
          {{monthText}} {{year}}</div>
        <button class="pw-btn-icon-small" (click)="applyFilters('right')" style="font-size: 14px;"><i
            class="fa fa-chevron-right"></i></button>
      </div>

      <!-- Total Amount -->
      <div style="font-weight: 700; font-size: 18px; color: #38bdf8; text-align: right;">
        {{total | number:'1.2-2'}} <span
          style="font-size: 12px; opacity: 0.8; font-weight: 400; color: var(--pw-text);">AED</span>
      </div>
    </div>

    <!-- Expand/Collapse Actions & Items Count -->
    <div *ngIf="count > 0 && !loading"
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px;">
      <div style="display: flex; gap: 16px;">
        <button class="pw-btn-text" (click)="expandAll()" style="color: #0ea5e9; font-size: 12px;">
          Expand All
        </button>
        <div style="width: 1px; background: rgba(14, 165, 233, 0.2); height: 16px; align-self: center;"></div>
        <button class="pw-btn-text" (click)="collapseAll()" style="color: #0ea5e9; font-size: 12px;">
          Collapse All
        </button>
      </div>
      <div style="font-size: 14px; letter-spacing: 0px;">
        <span style="font-weight: 700; color: #fff;">{{ count }}</span> <span class="pw-muted">&nbsp;Items</span>
      </div>
    </div>

    <!-- Add All Button (when empty) -->
    <div *ngIf="resData.length == 0 && !loading" style="display: flex; justify-content: flex-end; margin-bottom: 16px;">
      <button class="pw-btn pw-btn-ghost pw-btn-sm"
        style="border: 1px solid rgba(14, 165, 233, 0.4); padding: 6px 14px; border-radius: 999px; font-weight: 600;"
        (click)="addAllBudget()">
        <i class="fa fa-plus" style="margin-right: 4px; color: #14b8a6;"></i> Add All
      </button>
    </div>

    <!-- Main List Card -->
    <div *ngIf="count > 0 && !loading" class="cat-main-card pw-glass">

      <div *ngFor="let main of groupedDataKeys(); let lastMain = last" class="main-block" [class.no-border]="lastMain">
        <!-- Main Row -->
        <button class="row-btn main-row" (click)="toggleMain(main)">
          <div class="row-left">
            <div class="dot-indicator"></div>
            <div class="main-title">{{ main | uppercase }}</div>
          </div>
          <div class="row-right">
            <span class="row-meta"><span style="color: #38bdf8; opacity: 1;">{{ mainTotal(main)
                | number:'1.2-2'
                }}</span> <span
                style="font-weight:400; font-size:11px; opacity:0.6; color: var(--pw-text);">AED</span></span>
            <i class="fa" [ngClass]="isMainExpanded(main) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </div>
        </button>

        <!-- Subcategories Block -->
        <div *ngIf="isMainExpanded(main)" class="subcat-container">
          <div *ngFor="let sub of groupedData[main] | keys" class="sub-block">
            <!-- Subcategory Row -->
            <button class="row-btn subcat-row" (click)="toggleSub(main, sub.key)">
              <div class="row-left">
                <div class="subcat-title">{{ sub.key }}</div>
              </div>
              <div class="row-right">
                <span class="row-meta"><span style="color: #38bdf8; opacity: 1;">{{
                    subTotal(main, sub.key) |
                    number:'1.2-2' }}</span> <span
                    style="font-weight:400; font-size:11px; opacity:0.6; color: var(--pw-text);">AED</span></span>
                <i class="fa" [ngClass]="isSubExpanded(main, sub.key) ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
              </div>
            </button>

            <!-- Items Block -->
            <div *ngIf="isSubExpanded(main, sub.key)" class="items-container">
              <div *ngFor="let categoryObj of sub.value; let isLast = last" class="item-row"
                [class.item-row-last]="isLast">

                <div class="row-left">
                  <div class="item-title">{{ categoryObj.category }}</div>
                </div>

                <div class="row-right">
                  <div style="font-weight: 500; font-size: 14px; color: #38bdf8;">
                    {{categoryObj.price}} <span
                      style="font-size: 11px; opacity: 0.8; font-weight: 400; color: var(--pw-text);">AED</span>
                  </div>
                  <button class="pw-btn-icon-small" [matMenuTriggerFor]="afterMenu">
                    <i class="fa fa-ellipsis-h" style="opacity: 0.5;"></i>
                  </button>

                  <mat-menu #afterMenu="matMenu" xPosition="after">
                    <button mat-menu-item (click)="openDialog(categoryObj, 'Budget-Edit', 100, 100)">Edit</button>
                  </mat-menu>
                </div>

              </div>
            </div>

          </div>
        </div>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="count == 0 && !loading" class="empty-state">
      <i class="fa fa-exclamation-triangle"></i>
      <p>No records in this month</p>
      <small>Tap + to add new budget.</small>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="loading">
      <img src="./../../../assets/loading.gif" style="height: 15em;">
    </div>

    <!-- <app-footer></app-footer> -->

  </div>
</div>
