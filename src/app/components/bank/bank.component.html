<div class="pw-page">
  <div class="pw-container pw-stack">
    <div class="pw-glass pw-header">
      <div>
        <button class="pw-btn pw-btn-ghost" routerLink="/home">
          <i class="fa fa-arrow-left"></i>
          Bank
        </button>
        <div class="pw-subtitle">Balance & records</div>
      </div>

      <div class="pw-row">
        <div class="pw-kpi">
          <div class="pw-subtitle">Total (AED)</div>
          <div class="pw-kpi-value">{{ total | number:'1.2-2' }}</div>
        </div>

        <button type="button" class="pw-btn pw-btn-primary" (click)="openDialog('', 'Bank-Record-Add', 100, 100)">
          <i class="fa fa-plus"></i>
          Add record
        </button>

        <button type="button" class="pw-btn pw-btn-ghost" (click)="filterOn = !filterOn">
          <i class="fa fa-filter"></i>
          Filter
        </button>
      </div>
    </div>

    <div *ngIf="filterOn" class="pw-glass pw-card">
      <form [formGroup]="filterForm" (ngSubmit)="applyFilters()">
        <div class="row g-2 align-items-center">
          <div class="col-5">
            <select class="pw-select" formControlName="filterMonth">
              <option *ngFor="let month of months">{{month}}</option>
            </select>
          </div>
          <div class="col-5">
            <select class="pw-select" formControlName="filterYear">
              <option *ngFor="let year of years">{{year}}</option>
            </select>
          </div>
          <div class="col-2 d-grid">
            <button type="submit" class="pw-btn pw-btn-primary" aria-label="Apply filter">
              <i class="fa fa-search"></i>
            </button>
          </div>
        </div>
      </form>
    </div>

    <div *ngIf="count > 0 && !loading" class="table-container">
      <div *ngFor="let group of groupedDataArray" class="pw-glass pw-card">
        <div class="pw-title" style="font-size:14px">{{ group.date | date : 'MMM dd, EEEE'}}</div>
        <div class="pw-muted" style="font-size:12px; margin-top:2px">Records</div>

        <div style="margin-top:10px; display:grid; gap:10px">
          <div *ngFor="let item of group.items">
            <button class="bank-row" [matMenuTriggerFor]="beforeMenu"
              [ngStyle]="{'margin-bottom': group.items.length > 0 ? '0.0em': '0px'}">
              <div class="left">
                <div class="name">{{item.name}}</div>
              </div>
              <div class="right">
                <div class="amt">{{item.price | number:'1.2-2'}} <small>AED</small></div>
              </div>
            </button>
            <mat-menu #beforeMenu="matMenu" xPosition="before">
              <button mat-menu-item (click)="openDialog(item, 'Bank-Record-Edit', 100, 100)">Edit</button>
              <button mat-menu-item (click)="openDialog(item, 'Bank-Record-Delete', 100, 100)">Delete</button>
            </mat-menu>
          </div>
        </div>
      </div>
    </div>

    <div class="" *ngIf="count == 0 && !loading" style="margin: auto; text-align: center; margin-top:4em">
      <i class="fa fa-exclamation-triangle grey-color fa-5x"></i>
      <p></p>
      No record in this month
      <p></p>Tap + to add new record.
    </div>

    <div *ngIf="loading" style="text-align: center; ">
      <img src="./../../../assets/loading.gif" style="height: 15em; ">
    </div>

    <!-- <app-footer></app-footer> -->
  </div>
</div>
