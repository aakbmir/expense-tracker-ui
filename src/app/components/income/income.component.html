<div class="pw-page">
  <div class="pw-container pw-stack">
    <!-- Top Header -->
    <div
      style="padding: 0px 10px; padding-bottom: 10px; margin-bottom: 0px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; display: flex; justify-content: space-between; align-items: center; gap: 12px;">
        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Expense </h2>
        <button class="pw-btn-icon-small mobile-only" (click)="themeService.toggleTheme()"
          style="font-size: 18px; color: var(--pw-text); margin: 0; padding: 0; width: auto; height: auto;">
          <i class="fa" [ngClass]="(themeService.isLightMode$ | async) ? 'fa-moon-o' : 'fa-sun-o'"></i>
        </button>
      </div>
    </div>

    <!-- Month & Total Sub-Header -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 0px;">
      <!-- Month selection -->
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="pw-btn-icon-small" (click)="applyFilters('left')" style="font-size: 14px;"><i
            class="fa fa-chevron-left"></i></button>
        <div
          style="margin: 0; font-weight: 500; font-size: 16px; color: var(--pw-text); letter-spacing: 0.5px; width: 110px; text-align: center;">
          {{monthText}} {{year}}</div>
        <button class="pw-btn-icon-small" (click)="applyFilters('right')" style="font-size: 14px;"><i
            class="fa fa-chevron-right"></i></button>
      </div>

      <!-- Total Amount -->
      <div style="font-weight: 700; font-size: 18px; color: #10b981; text-align: right;">
        {{total | number:'1.2-2'}} <span
          style="font-size: 12px; opacity: 0.8; font-weight: 400; color: var(--pw-text);">AED</span>
      </div>
    </div>

    <!-- Expand/Collapse, Items count & Add -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px;">

      <!-- Expand & Collapse (Left) -->
      <div *ngIf="count > 0 && !loading" style="display: flex; gap: 16px;">
        <button class="pw-btn-text" (click)="expandAll()" style="color: #10b981; font-size: 12px;">
          Expand All
        </button>
        <div style="width: 1px; background: rgba(16, 185, 129, 0.2); height: 16px; align-self: center;"></div>
        <button class="pw-btn-text" (click)="collapseAll()" style="color: #10b981; font-size: 12px;">
          Collapse All
        </button>
      </div>

      <!-- Items Count & Add Wrapper (Right) -->
      <div style="display: flex; align-items: center; gap: 12px; margin-left: auto;">
        <div style="font-size: 14px; letter-spacing: 0px;">
          <span style="font-weight: 700; color: #fff;">{{ count }}</span> <span class="pw-muted">&nbsp;Items</span>
        </div>
        <button class="pw-btn pw-btn-ghost pw-btn-sm"
          style="border: 1px solid rgba(16, 185, 129, 0.4); padding: 4px 12px; border-radius: 999px; font-weight: 600;"
          (click)="openDialog('', 'Income-Add', 100, 100)">
          <i class="fa fa-plus" style="margin-right: 4px; color: #10b981;"></i> Add
        </button>
      </div>

    </div>

    <!-- Main List Card -->
    <div *ngIf="count > 0 && !loading" class="cat-main-card pw-glass">

      <div *ngFor="let group of groupedDataArray; let lastMain = last" class="main-block" [class.no-border]="lastMain">

        <!-- Date Header Row -->
        <button class="row-btn main-row" (click)="toggleGroup(group.date)">
          <div class="row-left">
            <!-- Income dots get green highlight -->
            <div class="dot-indicator"></div>
            <div class="main-title">{{ group.date | date : 'MMM dd, EEEE' | uppercase }}</div>
          </div>
          <div class="row-right">
            <i class="fa" [ngClass]="isGroupExpanded(group.date) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </div>
        </button>

        <div *ngIf="isGroupExpanded(group.date)" class="subcat-container">
          <!-- Items Block -->
          <div class="items-container">
            <div *ngFor="let item of group.items; let isLast = last" class="item-row" [class.item-row-last]="isLast"
              style="padding-top: 14px; padding-bottom: 14px;">

              <div class="row-left" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                <div class="item-title" style="font-weight: 500; font-size: 15px;">{{ item.category }}</div>
              </div>

              <div class="row-right" style="flex-direction: row; align-items: center; gap: 16px;">
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                  <div style="font-weight: 500; font-size: 14px; color: #10b981;">
                    {{item.price | number:'1.2-2'}} <span
                      style="font-size: 11px; opacity: 0.8; font-weight: 400; color: var(--pw-text);">AED</span>
                  </div>
                  <div
                    style="font-size: 12px; color: var(--pw-muted); max-width: 110px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    {{item.note}}</div>
                </div>

                <div style="margin-left: 0px;">
                  <button class="pw-btn-icon-small" [matMenuTriggerFor]="beforeMenu">
                    <i class="fa fa-ellipsis-h" style="opacity: 0.5;"></i>
                  </button>
                  <mat-menu #beforeMenu="matMenu" xPosition="before">
                    <button mat-menu-item (click)="openDialog(item, 'Income-Edit', 100, 100)">Edit</button>
                    <button mat-menu-item (click)="openDialog(item, 'Income-Delete', 100, 100)">Delete</button>
                  </mat-menu>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="count == 0 && !loading" class="empty-state">
      <i class="fa fa-exclamation-triangle"></i>
      <p>No records in this month</p>
      <small>Tap + to add new Income.</small>
    </div>

    <!-- SKELETON LOADING -->
    <div *ngIf="loading" class="skeleton-wrapper">
      <div class="skeleton-row">
        <div class="skeleton-col" style="gap: 4px;">
          <div class="skeleton skeleton-title"></div>
          <div class="skeleton skeleton-text" style="width: 60%;"></div>
        </div>
        <div class="skeleton skeleton-circle" style="width: 24px; height: 24px;"></div>
      </div>
      <div class="skeleton-row">
        <div class="skeleton-col" style="gap: 4px;">
          <div class="skeleton skeleton-title" style="width: 40%;"></div>
          <div class="skeleton skeleton-text" style="width: 70%;"></div>
        </div>
        <div class="skeleton skeleton-circle" style="width: 24px; height: 24px;"></div>
      </div>
      <div class="skeleton-row">
        <div class="skeleton-col" style="gap: 4px;">
          <div class="skeleton skeleton-title" style="width: 55%;"></div>
          <div class="skeleton skeleton-text" style="width: 50%;"></div>
        </div>
        <div class="skeleton skeleton-circle" style="width: 24px; height: 24px;"></div>
      </div>
    </div>

  </div>
</div>
