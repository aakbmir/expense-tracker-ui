<div class="pw-page">
  <div class="pw-container pw-stack">
    <!-- Top Header -->
    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 2px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">
        <i class="fa fa-bars mobile-only" [matMenuTriggerFor]="routeMenu"
          style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);"></i>

        <mat-menu #routeMenu="matMenu">
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/reports']"><i class="fa fa-pie-chart"
              style="width: 24px;"></i> Overview</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/expense']"><i class="fa fa-list-alt"
              style="width: 24px;"></i> Expense</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/budget']"><i class="fa fa-credit-card"
              style="width: 24px;"></i> Budget</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/category']"><i class="fa fa-tags"
              style="width: 24px;"></i> Category</button>
        </mat-menu>


        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Expense
        </h2>
      </div>
    </div>

    <!-- Month & Total Sub-Header -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; padding: 0 0px;">
      <!-- Month selection -->
      <div style="display: flex; gap: 12px; align-items: center;">
        <button class="pw-btn-icon-small" (click)="applyFilters('left')" style="font-size: 14px;"><i
            class="fa fa-chevron-left"></i></button>
        <div
          style="margin: 0; font-weight: 500; font-size: 16px; color: var(--pw-text); letter-spacing: 0.5px; width: 110px; text-align: center;">
          {{monthText}} {{year}}</div>
        <button class="pw-btn-icon-small" (click)="applyFilters('right')" style="font-size: 14px;"><i
            class="fa fa-chevron-right"></i></button>
      </div>

      <!-- Total Amount -->
      <div
        style="font-weight: 700; font-size: 18px; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5); text-align: right;">
        {{total | number:'1.2-2'}} <span
          style="font-size: 12px; opacity: 0.8; font-weight: 400; color: var(--pw-text); text-shadow: none;">AED</span>
      </div>
    </div>

    <!-- Expand/Collapse, Items count & Add -->
    <div
      style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding: 0 4px;">

      <!-- Expand & Collapse (Left) -->
      <div *ngIf="count > 0 && !loading" style="display: flex; gap: 16px;">
        <button class="pw-btn-text" (click)="expandAll()" style="color: #0ea5e9; font-size: 12px;">
          Expand All
        </button>
        <div style="width: 1px; background: rgba(14, 165, 233, 0.2); height: 16px; align-self: center;"></div>
        <button class="pw-btn-text" (click)="collapseAll()" style="color: #0ea5e9; font-size: 12px;">
          Collapse All
        </button>
      </div>

      <!-- Items Count & Add Wrapper (Right) -->
      <div style="display: flex; align-items: center; gap: 12px; margin-left: auto;">
        <div style="font-size: 14px; letter-spacing: 0px;">
          <span style="font-weight: 700; color: #fff;">{{ count }}</span> <span class="pw-muted">&nbsp;Items</span>
        </div>
        <button class="pw-btn pw-btn-ghost pw-btn-sm"
          style="border: 1px solid rgba(14, 165, 233, 0.4); padding: 4px 12px; border-radius: 999px; font-weight: 600;"
          (click)="openDialog('', 'Expense-Add', 100, 100)">
          <i class="fa fa-plus" style="margin-right: 4px; color: #14b8a6;"></i> Add
        </button>
      </div>

    </div>

    <!-- Main List Card -->
    <div *ngIf="count > 0 && !loading" class="cat-main-card pw-glass">

      <div *ngFor="let group of groupedDataArray; let lastParent = last" class="parent-block"
        [class.no-border]="lastParent">

        <!-- Date Header Row -->
        <button class="row-btn parent-row" (click)="toggleGroup(group.date)">
          <div class="row-left">
            <!-- Expense dots get red highlight -->
            <div class="dot-indicator"></div>
            <div class="parent-title">{{ group.date | date : 'MMM dd, EEEE' | uppercase }}</div>
          </div>
          <div class="row-right">
            <i class="fa" [ngClass]="isGroupExpanded(group.date) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </div>
        </button>

        <div *ngIf="isGroupExpanded(group.date)" class="subcat-container">
          <!-- Items Block -->
          <div class="items-container">
            <div *ngFor="let item of group.items; let isLast = last" class="item-row" [class.item-row-last]="isLast"
              style="padding-top: 14px; padding-bottom: 14px;">

              <div class="row-left" style="flex-direction: column; align-items: flex-start; gap: 4px;">
                <div class="item-title" style="font-weight: 500; font-size: 15px;">{{ item.category }}</div>
                <div style="font-size: 12px; color: var(--pw-muted);">{{ item.superCategory }} - {{ item.parentCategory
                  }}</div>
              </div>

              <div class="row-right" style="flex-direction: row; align-items: center; gap: 16px;">
                <div style="display: flex; flex-direction: column; align-items: flex-end; gap: 4px;">
                  <div
                    style="font-weight: 500; font-size: 14px; color: #38bdf8; text-shadow: 0 0 4px rgba(56, 189, 248, 0.4);">
                    {{item.price | number:'1.2-2'}} <span
                      style="font-size: 11px; opacity: 0.8; font-weight: 400; color: var(--pw-text); text-shadow: none;">AED</span>
                  </div>
                  <div
                    style="font-size: 12px; color: var(--pw-muted); max-width: 110px; text-align: right; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;">
                    {{item.note}}</div>
                </div>

                <div style="margin-left: 0px;">
                  <button class="pw-btn-icon-small" [matMenuTriggerFor]="beforeMenu">
                    <i class="fa fa-ellipsis-h" style="opacity: 0.5;"></i>
                  </button>
                  <mat-menu #beforeMenu="matMenu" xPosition="before">
                    <button mat-menu-item (click)="openDialog(item, 'Expense-Edit', 100, 100)">Edit</button>
                    <button mat-menu-item (click)="openDialog(item, 'Expense-Delete', 100, 100)">Delete</button>
                  </mat-menu>
                </div>
              </div>
            </div>
          </div>
        </div>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="count == 0 && !loading" class="empty-state">
      <i class="fa fa-exclamation-triangle"></i>
      <p>No records in this month</p>
      <small>Tap + to add new Expense.</small>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="loading">
      <img src="./../../../assets/loading.gif" style="height: 15em;">
    </div>

    <!-- <app-footer></app-footer> -->

  </div>
</div>
