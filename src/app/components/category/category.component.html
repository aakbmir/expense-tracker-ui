<div class="pw-page">
  <div class="pw-container pw-stack">

    <!-- Top Header -->
    <div
      style="margin-top: 2px; padding: 7px 0; padding-bottom: 20px; margin-bottom: 2px; border-bottom: 1px solid transparent; border-image: linear-gradient(to right, transparent, rgba(56, 189, 248, 0.8), transparent) 1;">
      <div style="position: relative; text-align: center;">
        <i class="fa fa-bars mobile-only" [matMenuTriggerFor]="routeMenu"
          style="position: absolute; left: 10px; top: 50%; transform: translateY(-50%); font-size: 18px; cursor: pointer; color: #38bdf8; text-shadow: 0 0 8px rgba(56, 189, 248, 0.5);"></i>

        <mat-menu #routeMenu="matMenu">
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/reports']"><i class="fa fa-pie-chart"
              style="width: 24px;"></i> Overview</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/expense']"><i class="fa fa-list-alt"
              style="width: 24px;"></i> Expense</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/budget']"><i class="fa fa-credit-card"
              style="width: 24px;"></i> Budget</button>
          <button mat-menu-item routerLinkActive="active-route" [routerLink]="['/category']"><i class="fa fa-tags"
              style="width: 24px;"></i> Category</button>
        </mat-menu>


        <h2 style="margin: 0; font-weight: 500; font-size: 20px; color: var(--pw-text); letter-spacing: 0.5px;">
          Category
        </h2>
      </div>
    </div>

    <!-- Items count & Add -->
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px;">
      <div style="font-size: 15px; letter-spacing: 0px;">
        <span style="font-weight: 700;">{{ total }}</span> <span class="pw-muted">&nbsp;Items</span>
      </div>

      <button class="pw-btn pw-btn-ghost pw-btn-sm"
        style="border: 1px solid rgba(15, 55, 130, 0.4); padding: 6px 14px; border-radius: 999px; font-weight: 600;"
        (click)="openDialog('', 'Category-Add', 100, 100)">
        <i class="fa fa-plus" style="margin-right: 4px; color: #14b8a6;"></i> Add
      </button>
    </div>

    <!-- Expand/Collapse Actions -->
    <div *ngIf="total > 0 && !loading" style="display: flex; gap: 16px; margin-bottom: 16px;">
      <button class="pw-btn-text" (click)="expandAll()" style="color: #0ea5e9; font-size: 12px;">
        Expand All
      </button>
      <div style="width: 1px; background: rgba(14, 165, 233, 0.2); height: 16px; align-self: center;"></div>
      <button class="pw-btn-text" (click)="collapseAll()" style="color: #0ea5e9; font-size: 12px;">
        Collapse All
      </button>
    </div>

    <!-- Main List Card -->
    <div *ngIf="total > 0 && !loading" class="cat-main-card pw-glass">

      <div *ngFor="let parent of groupedDataKeys(); let lastParent = last" class="parent-block"
        [class.no-border]="lastParent">

        <!-- Parent Row -->
        <button class="row-btn parent-row" (click)="toggleParent(parent)">
          <div class="row-left">
            <div class="dot-indicator"></div>
            <div class="parent-title">{{ parent | uppercase }}</div>
          </div>
          <div class="row-right">
            <span class="row-meta">{{ parentCount(parent) }} items</span>
            <i class="fa" [ngClass]="isParentExpanded(parent) ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
          </div>
        </button>

        <!-- Subcategories Block -->
        <div *ngIf="isParentExpanded(parent)" class="subcat-container">
          <div *ngFor="let sub of groupedData[parent] | keys" class="sub-block">

            <!-- Subcategory Row -->
            <button class="row-btn subcat-row" (click)="toggleSub(parent, sub.key)">
              <div class="row-left">
                <div class="subcat-title">{{ sub.key }}</div>
              </div>
              <div class="row-right">
                <span class="row-meta">{{ sub.value.length }} items</span>
                <i class="fa" [ngClass]="isSubExpanded(parent, sub.key) ? 'fa-chevron-down' : 'fa-chevron-right'"></i>
              </div>
            </button> <!-- Border line style is applied to subcat-row -->

            <!-- Items Block -->
            <div *ngIf="isSubExpanded(parent, sub.key)" class="items-container">
              <div *ngFor="let categoryObj of sub.value; let isLast = last" class="item-row"
                [class.item-row-last]="isLast">

                <div class="row-left">
                  <div class="item-title">{{ categoryObj.category }}</div>
                </div>

                <div class="row-right">
                  <button class="pw-btn-icon-small" [matMenuTriggerFor]="menu">
                    <i class="fa fa-ellipsis-h" style="opacity: 0.5;"></i>
                  </button>

                  <mat-menu #menu="matMenu" xPosition="after">
                    <button mat-menu-item (click)="openDialog(categoryObj, 'Category-Edit', 100, 100)">Edit</button>
                    <button mat-menu-item (click)="openDialog(categoryObj, 'Category-Delete', 100, 100)">Delete</button>
                  </mat-menu>
                </div>

              </div>
            </div>

          </div>
        </div>

      </div>

    </div>

    <!-- EMPTY STATE -->
    <div *ngIf="total == 0 && !loading" class="empty-state">
      <i class="fa fa-exclamation-triangle"></i>
      <p>No records this month</p>
      <small>Tap + to add a new category</small>
    </div>

    <!-- LOADING -->
    <div *ngIf="loading" class="loading">
      <img src="./../../../assets/loading.gif">
    </div>

    <!-- <app-footer></app-footer> -->

  </div>
</div>
