<div class="pw-app-layout">
  <!-- Desktop Sidebar -->
  <nav class="pw-desktop-sidebar">
    <div class="sidebar-brand">
      <img src="assets/images/penny_logo.png" alt="PennyWise logo" class="sidebar-logo">
      <h1 class="sidebar-title">PennyWise</h1>
    </div>

    <div class="sidebar-menu">
      <!-- <a class="sidebar-link" routerLink="/home" routerLinkActive="active">
        <i class="fa fa-home"></i> Home
      </a> -->
      <a class="sidebar-link" routerLink="/reports" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">
        <i class="fa fa-pie-chart"></i> Reports
      </a>
      <a class="sidebar-sublink" routerLink="/reports/overview" routerLinkActive="active">
        <i class="fa fa-bar-chart"></i> Overview
      </a>
      <a class="sidebar-sublink" routerLink="/reports/trend" routerLinkActive="active">
        <i class="fa fa-line-chart"></i> Trend
      </a>
      <a class="sidebar-sublink" routerLink="/reports/group" routerLinkActive="active">
        <i class="fa fa-users"></i> Group
      </a>
      <a class="sidebar-link" routerLink="/expense" routerLinkActive="active">
        <i class="fa fa-list-alt"></i> Expense
      </a>
      <a class="sidebar-link" routerLink="/income" routerLinkActive="active">
        <i class="fa fa-money"></i> Income
      </a>
      <a class="sidebar-link" routerLink="/budget" routerLinkActive="active">
        <i class="fa fa-credit-card"></i> Budget
      </a>
      <a class="sidebar-link" routerLink="/category" routerLinkActive="active">
        <i class="fa fa-tags"></i> Category
      </a>
      <!-- <a class="sidebar-link" routerLink="/bank" routerLinkActive="active">
        <i class="fa fa-university"></i> Bank
      </a> -->
    </div>

    <!-- Desktop Theme Toggle -->
    <div style="margin-top: auto; padding-top: 20px;">
      <button class="pw-btn pw-btn-ghost" style="width: 100%; display: flex; align-items: center; gap: 12px; justify-content: center;" (click)="toggleTheme()">
        <i class="fa" [ngClass]="(themeService.isLightMode$ | async) ? 'fa-moon-o' : 'fa-sun-o'"></i>
        <span *ngIf="(themeService.isLightMode$ | async)">Dark Mode</span>
        <span *ngIf="!(themeService.isLightMode$ | async)">Light Mode</span>
      </button>
    </div>
  </nav>

  <!-- Mobile Floating Theme Toggle -->
  <button class="pw-theme-toggle-mobile mobile-only" (click)="toggleTheme()">
    <i class="fa" [ngClass]="(themeService.isLightMode$ | async) ? 'fa-moon-o' : 'fa-sun-o'"></i>
  </button>

  <!-- Main Content Area -->
  <main class="pw-app-content">
    <div class="containe">
      <router-outlet></router-outlet>
    </div>
  </main>

  <!-- Mobile Bottom Navigation -->
  <nav class="pw-bottom-nav mobile-only">
    <a class="nav-item" routerLink="/reports" routerLinkActive="active" [routerLinkActiveOptions]="{exact: false}">
      <i class="fa fa-pie-chart"></i>
      <span>Overview</span>
    </a>
    <a class="nav-item" routerLink="/expense" routerLinkActive="active">
      <i class="fa fa-list-alt"></i>
      <span>Expense</span>
    </a>
    <a class="nav-item" routerLink="/income" routerLinkActive="active">
      <i class="fa fa-money"></i>
      <span>Income</span>
    </a>
    <a class="nav-item" routerLink="/budget" routerLinkActive="active">
      <i class="fa fa-credit-card"></i>
      <span>Budget</span>
    </a>
    <a class="nav-item" routerLink="/category" routerLinkActive="active">
      <i class="fa fa-tags"></i>
      <span>Category</span>
    </a>
  </nav>
</div>
