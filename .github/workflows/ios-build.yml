name: Build iOS App

on:
  push:
    branches: [ "master", "main" ]
  workflow_dispatch: # Allows you to manually trigger the build from GitHub

jobs:
  build_ios:
    name: Build iOS
    runs-on: macos-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18' # Adjust to your Node version

      - name: Install Dependencies
        run: npm install

      - name: Build Web Assets
        run: npm run build

      - name: Sync Capacitor iOS
        run: npx cap sync ios

      - name: Build iOS App (Unsigned)
        run: |
          cd ios/App
          # Using xcodebuild to build the app for an iOS generic device
          # Note: Without a provisioning profile, we cannot generate a signed .ipa file, 
          # but we can build the .app file which can be run on iOS simulators.
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Zip the .app file
        run: |
          cd ios/App/DerivedData/App/Build/Products/Release-iphoneos
          # Some xcodebuild outputs might go to standard paths if not using DerivedData locally, 
          # but GitHub Actions usually places them in standard derived data locations, 
          # actually we should specify SYMROOT to easily find it.
          
      # Let's adjust the xcodebuild step to output to a specific folder:
      - name: Build iOS App (Fixed path)
        run: |
          cd ios/App
          xcodebuild clean build \
            -workspace App.xcworkspace \
            -scheme App \
            -configuration Release \
            -destination 'generic/platform=iOS' \
            SYMROOT=$(PWD)/build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO
            
      - name: Package Output
        run: |
          cd ios/App/build/Release-iphoneos
          # We need to create a Payload folder to spoof an IPA, although it's unsigned
          mkdir Payload
          cp -r App.app Payload/
          zip -r app-unsigned.ipa Payload

      - name: Upload iOS App Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ios-app-unsigned
          path: ios/App/build/Release-iphoneos/app-unsigned.ipa
          retention-days: 7
